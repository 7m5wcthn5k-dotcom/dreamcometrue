<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>하루의운명을카드쪼가리에맡겨보기</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --surface: #f5f5f4;
    --ink: #111111;
    --ink-muted: #888;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --accent: #e4fff5;
    --accent-deep: #1a6b4a;
    --radius: 18px;
    --font: 'Noto Sans KR', sans-serif;
  }
  html, body { min-height: 100vh; background: var(--bg); color: var(--ink); font-family: var(--font); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; }
  .page { max-width: 420px; margin: 0 auto; padding: 3rem 1.5rem 5rem; display: flex; flex-direction: column; align-items: center; gap: 2rem; }

  .date-pill { font-size: 12px; color: var(--accent-deep); background: var(--accent); border: 0.5px solid rgba(26,107,74,0.18); border-radius: 999px; padding: 5px 14px; font-family: var(--font); }

  .cards-row { display: flex; gap: 14px; justify-content: center; }
  .card {
    width: 110px; height: 188px; border-radius: var(--radius);
    background: #111; border: 0.5px solid rgba(255,255,255,0.07);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; position: relative; overflow: hidden;
    transition: transform 0.18s ease;
  }
  .card:hover { transform: translateY(-6px); }
  .card.done { cursor: default; }
  .card.done:not(.selected) { transform: none; pointer-events: none; }
  .card .c-inner { position: absolute; inset: 11px; border: 0.5px solid rgba(228,255,245,0.1); border-radius: 9px; pointer-events: none; }
  .card .c-sym { font-size: 2rem; color: rgba(228,255,245,0.14); user-select: none; }
  .card .c-num { font-size: 11px; color: rgba(228,255,245,0.22); letter-spacing: 0.12em; font-family: var(--font); }
  .card.selected { background: var(--accent); border-color: rgba(26,107,74,0.18); transform: none; }
  .card.selected .c-inner { border-color: rgba(26,107,74,0.1); }
  .card.selected .c-sym { color: rgba(26,107,74,0.35); }
  .card.selected .c-num { color: rgba(26,107,74,0.35); }

  .hint { font-size: 12px; color: var(--accent-deep); text-align: center; line-height: 1.6; font-family: var(--font); }

  .result-box {
    width: 100%; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius);
    padding: 1.25rem; display: none; flex-direction: column; gap: 14px;
    animation: fadeUp 0.4s ease both;
  }
  .result-box.visible { display: flex; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  .r-label { font-size: 11px; color: var(--ink-muted); letter-spacing: 0.07em; margin-bottom: 5px; font-family: var(--font); }
  .r-text { font-size: 14px; color: var(--ink); line-height: 1.72; font-weight: 300; font-family: var(--font); }

  .divider { height: 0.5px; background: var(--border); }

  .chip-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .chip { background: var(--bg); border: 0.5px solid var(--border-strong); border-radius: 12px; padding: 10px 12px; }
  .chip .cl { font-size: 11px; color: var(--ink-muted); margin-bottom: 4px; font-family: var(--font); }
  .chip .cv { font-size: 14px; color: var(--ink); font-weight: 500; font-family: var(--font); }

  .reset-btn {
    align-self: center; background: transparent; border: 0.5px solid var(--border);
    border-radius: 999px; padding: 5px 14px; font-size: 11px; color: var(--ink-muted);
    cursor: pointer; font-family: var(--font); transition: background 0.13s;
  }
  .reset-btn:hover { background: var(--surface); color: var(--ink); }
</style>
</head>
<body>
<main class="page">
  <div class="date-pill" id="datePill"></div>

  <div class="cards-row">
    <div class="card" id="c0" onclick="pick(0)">
      <div class="c-inner"></div>
      <div class="c-sym">✦</div>
      <div class="c-num">I</div>
    </div>
    <div class="card" id="c1" onclick="pick(1)">
      <div class="c-inner"></div>
      <div class="c-sym">✦</div>
      <div class="c-num">II</div>
    </div>
    <div class="card" id="c2" onclick="pick(2)">
      <div class="c-inner"></div>
      <div class="c-sym">✦</div>
      <div class="c-num">III</div>
    </div>
  </div>

  <div class="hint" id="hint">높은 적중률을 위해 카드는 1일 1회만 뽑아보세요</div>

  <div class="result-box" id="resultBox">
    <div class="chip-row">
      <div class="chip">
        <div class="cl">행운의 컬러</div>
        <div class="cv" id="rColor"></div>
      </div>
      <div class="chip">
        <div class="cl">행운의 아이템</div>
        <div class="cv" id="rItem"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div>
      <div class="r-label">오늘의 메시지</div>
      <div class="r-text" id="rFortune"></div>
    </div>
    <button class="reset-btn" onclick="reset()">↺ 다시 뽑기</button>
  </div>
</main>

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
}

document.getElementById('datePill').textContent = todayStr();

let picked = false;

function pick(idx) {
  if (picked) return;
  picked = true;

  const cards = document.querySelectorAll('.card');
  cards.forEach((c, i) => {
    c.classList.add('done');
    if (i === idx) c.classList.add('selected');
  });

  const result = DATA[Math.floor(Math.random() * DATA.length)];
  document.getElementById('rColor').textContent = result.color;
  document.getElementById('rItem').textContent = result.item;
  document.getElementById('rFortune').textContent = result.fortune;
  document.getElementById('hint').style.display = 'none';
  document.getElementById('resultBox').classList.add('visible');
}

function reset() {
  picked = false;
  document.querySelectorAll('.card').forEach(c => c.classList.remove('done', 'selected'));
  document.getElementById('hint').style.display = '';
  document.getElementById('resultBox').classList.remove('visible');
}
